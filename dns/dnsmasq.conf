# ─────────────────────────────────────────────────────────────
#  dnsmasq.conf — nchikt.ux network-wide DNS
#
#  This makes nchikt.ux resolve to your server IP
#  for EVERY device on your local network.
#
#  Usage:
#    1. Install dnsmasq:
#         macOS:  brew install dnsmasq
#         Linux:  sudo apt install dnsmasq
#
#    2. Find your machine's local IP:
#         macOS/Linux: ifconfig | grep "inet " | grep -v 127
#         Windows:     ipconfig
#
#    3. Replace 192.168.1.50 below with your actual local IP
#
#    4. Copy this file:
#         sudo cp dns/dnsmasq.conf /etc/dnsmasq.conf
#
#    5. Start dnsmasq:
#         sudo systemctl start dnsmasq   (Linux)
#         sudo brew services start dnsmasq (macOS)
#
#    6. Point your router's DNS to this machine's IP
#       OR manually set DNS on each device to this machine's IP
# ─────────────────────────────────────────────────────────────

# Listen on all interfaces
listen-address=0.0.0.0

# Resolve nchikt.ux to this machine
# ⬇️  CHANGE THIS to your actual local IP address
address=/nchikt.ux/192.168.1.50

# Forward other DNS to Cloudflare + Google
server=1.1.1.1
server=8.8.8.8

# Don't read /etc/hosts for upstream
# (Comment out if you want /etc/hosts to also apply)
# no-hosts

# Cache DNS for speed
cache-size=1000

# Log queries (optional, useful for debugging)
# log-queries
# log-facility=/var/log/dnsmasq.log
